# Starter manifest for a Forge app that hosts one or more Jira dashboard gadgets.
#
# This manifest has no `app.id` yet. Run `forge register` from this directory
# before your first deploy — it will ask for an app name and write the id here
# for you. See README.md for the full setup walkthrough.

modules:
  jira:dashboardGadget:
    - key: sprint-tri-burndown-gadget
      title: TRI Burndown
      description: Sprint burndown tracking dev complete, review complete and
        test complete (ideal, dev remaining, review remaining, remaining).
      thumbnail: https://raw.githubusercontent.com/wodutoit/jira-tri-burndown-change-dashboard-gadget/icons-v1/static/gadgets/public/icons/tri-burndown.svg
      resource: main
      resolver:
        function: resolver
      edit:
        resource: main

    - key: sprint-tri-scope-change-gadget
      title: TRI Scope Change
      description: Sprint scope change tracking — daily net SP change chart or
        a table of individual add/remove/excluded events.
      thumbnail: https://raw.githubusercontent.com/wodutoit/jira-tri-burndown-change-dashboard-gadget/icons-v1/static/gadgets/public/icons/tri-scope-change.svg
      resource: main
      resolver:
        function: resolver
      edit:
        resource: main

    - key: sprint-tri-rework-gadget
      title: TRI Rework
      description: Sprint rework tracking — daily test-failure kickback count
        chart or a table of individual rework events.
      thumbnail: https://raw.githubusercontent.com/wodutoit/jira-tri-burndown-change-dashboard-gadget/icons-v1/static/gadgets/public/icons/tri-rework.svg
      resource: main
      resolver:
        function: resolver
      edit:
        resource: main

    - key: sprint-tri-cycle-time-gadget
      title: TRI Cycle Time
      description: Cycle time per item — business hours spent in In Progress,
        Blocked, Code Review and Test, with estimate-vs-actual highlighting.
      thumbnail: https://raw.githubusercontent.com/wodutoit/jira-tri-burndown-change-dashboard-gadget/icons-v1/static/gadgets/public/icons/tri-cycle-time.svg
      resource: main
      resolver:
        function: resolver
      edit:
        resource: main

  function:
    - key: resolver
      handler: index.handler

resources:
  - key: main
    path: static/gadgets/build

permissions:
  scopes:
    - read:jira-work
    - read:issue:jira
    - read:project:jira
    - read:board-scope:jira-software
    - read:sprint:jira-software
    - read:issue-details:jira
    - read:jql:jira
    - storage:app

app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/517f0a5f-2176-4d4d-ab49-58514706fef1
